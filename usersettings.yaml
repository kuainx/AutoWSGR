# AutoWSGR v2 — 全量配置参考
# ==========================================
# 以下列出所有可配置项及其默认值。
# 实际使用时只需保留需要修改的项, 其余删除即可自动取默认值。
#
# 配置查找顺序:
#   1. launch("path/to/config.yaml")  — 显式指定
#   2. 当前工作目录下的 usersettings.yaml  — 自动检测
#   3. 无配置文件时使用内置默认值

# ═══════════════════════════════════════════
# 模拟器配置
# ═══════════════════════════════════════════
emulator:
  type: MuMu                       # 雷电 / 蓝叠 / MuMu / 夜神 / 逍遥 / WAYDROID
  path: null                       # 模拟器可执行文件路径; null = 自动检测
  serial: null                     # ADB serial 地址; null = 自动检测
  process_name: null               # 模拟器进程名; null = 自动推断

# ═══════════════════════════════════════════
# 游戏账号
# ═══════════════════════════════════════════
account:
  game_app: 官服                   # 官服 / 小米服 / 应用宝服
  account: null                    # 游戏账号 (用于自动登录)
  password: null                   # 游戏密码

# ═══════════════════════════════════════════
# OCR 引擎
# ═══════════════════════════════════════════
ocr:
  backend: easyocr                 # easyocr / paddleocr
  gpu: false                       # 是否使用 GPU 加速

# ═══════════════════════════════════════════
# 日志
# ═══════════════════════════════════════════
log:
  level: DEBUG                     # DEBUG / INFO / WARNING / ERROR / CRITICAL
  root: log                        # 日志保存根目录
  # dir: null                      # 日志保存路径; null = 自动按日期生成

  # 细粒度显示开关
  show_map_node: true
  show_android_input: false
  show_enemy_rules: false
  show_fight_stage: false
  show_chapter_info: false
  show_match_fight_stage: false
  show_decisive_battle_info: true
  show_ocr_info: false
  show_emulator_debug: false        # 是否输出 emulator 通道 DEBUG (click/swipe 等操作)
  show_ui_debug: false              # 是否输出 ui 通道 DEBUG (页面识别/等待轮询)
  show_vision_debug: false          # 是否输出 vision 通道 DEBUG (模板匹配规则结果)
  show_ops_debug: false             # 是否输出 ops 通道 DEBUG (页面导航/操作重试)
  show_combat_state_debug: false    # 是否输出战斗状态机转移 DEBUG (当前状态→候选列表)
  show_combat_recognition_debug: false  # 是否输出战斗识别 DEBUG (匹配状态/DLL返回/敌方编成)

  # 通道级别覆盖 (键=通道名前缀, 值=级别; 优先级高于上方布尔开关)
  # channels:
  #   vision.pixel: TRACE
  #   emulator: INFO

# ═══════════════════════════════════════════
# 脚本行为
# ═══════════════════════════════════════════
delay: 1.5                         # 延迟时间基本单位 (秒)
check_page: true                   # 启动时是否检查游戏页面
dock_full_destroy: true            # 船坞满时自动清空
repair_manually: false             # 是否手动修理
bathroom_feature_count: 1          # 浴室装饰数 (1-3)
bathroom_count: 2                  # 修理位置总数 (≤12)

# ── 解装设置 ──
destroy_ship_work_mode: 不启用     # 不启用 / 黑名单 / 白名单
destroy_ship_types: []             # 指定舰种列表, 参照 ShipType 枚举使用中文
  # - 航母
  # - 潜艇
remove_equipment_mode: true        # 拆解时默认卸下装备

# ── 数据路径 ──
plan_root: null                    # 自定义计划文件目录
ship_name_file: null               # 自定义舰船名文件

# ═══════════════════════════════════════════
# 日常自动化 (不需要可删除整个 daily_automation 块)
# ═══════════════════════════════════════════
daily_automation:
  # 基础日常
  auto_expedition: true            # 自动重复远征
  auto_gain_bonus: true            # 任务完成时自动点击
  auto_bath_repair: true           # 空闲时自动澡堂修理
  auto_set_support: false          # 自动开启战役支援

  # 战役
  auto_battle: true                # 自动打完每日战役次数
  battle_type: 困难潜艇            # 战役类型, 可选值见下方说明
  # 可选值: 简单航母 / 简单潜艇 / 简单驱逐 / 简单巡洋 / 简单战列
  #         困难航母 / 困难潜艇 / 困难驱逐 / 困难巡洋 / 困难战列

  # 演习
  auto_exercise: true              # 自动打完每日三次演习
  exercise_fleet_id: null          # 演习出征舰队 (null = 默认)

  # 常规战
  auto_normal_fight: true          # 按自定义任务进行常规战
  normal_fight_tasks: []           # 常规战任务列表
    # - task1.yaml
    # - task2.yaml
  quick_repair_limit: null         # 快修消耗上限; null = 无上限
  stop_max_ship: false             # 获取当天上限 500 船后终止
  stop_max_loot: false             # 获取当天上限 50 胖次后终止

# ═══════════════════════════════════════════
# 决战 (不需要可删除整个 decisive_battle 块)
# ═══════════════════════════════════════════
decisive_battle:
  chapter: 6                       # 决战章节 (1-6)
  level1:                          # 一级舰队
    - 鲃鱼
    - U-1206
    - U-47
    - 射水鱼
    - U-96
    - U-1405
  level2:                          # 二级舰队
    - U-81
    - 大青花鱼
  flagship_priority:               # 旗舰优先级队列
    - U-1405
    - U-47
    - U-96
    - U-1206
  repair_level: 1                  # 维修策略 (1=中破修, 2=大破修)
  use_quick_repair: true           # 是否启用快修（桶修），关闭后不修理受损舰船。
  full_destroy: false              # 船舱满了是否解装舰船
  useful_skill: false              # 充分利用技能
  useful_skill_strict: false       # 严格利用技能 (useful_skill 为 true 时才生效)
