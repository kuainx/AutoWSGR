name: Sync upstream

on:
  schedule:
    - cron: '*/30 * * * *'  # 每 30 分钟检测上游新提交
  workflow_dispatch:         # 也可手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork with upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh repo sync ${{ github.repository }} --force
