# Release & Publish — 版本号变更时自动触发，也可手动触发
# 创建 GitHub Release + 发布到 PyPI，不依赖 lint
name: Release & Publish

on:
  push:
    branches: [main]
    paths: [autowsgr/__init__.py]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: github.repository == 'OpenWSGR/AutoWSGR'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Extract version
        id: version
        run: |
          VERSION=$(python -c "exec(open('autowsgr/__init__.py').read()); print(__version__)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "AutoWSGR $VERSION" \
            --generate-notes \
            --latest

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Publish to PyPI
        if: steps.check_tag.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
