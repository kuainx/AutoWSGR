# 创建 GitHub Release — 当版本号变更推送到 main 时自动触发
# 先跑 lint + 构建检查，通过后创建 Release（python-publish.yml 独立处理 PyPI 推送）
name: Release

on:
  push:
    branches: [main]
    paths: [autowsgr/__init__.py]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── 质量门禁 ──
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit build
      - name: Run pre-commit checks
        run: pre-commit run --all-files
      - name: Verify package builds
        run: python -m build

  # ── 创建 GitHub Release ──
  release:
    needs: lint
    if: github.repository == 'OpenWSGR/AutoWSGR'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Extract version
        id: version
        run: |
          VERSION=$(python -c "exec(open('autowsgr/__init__.py').read()); print(__version__)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
      - name: Check if tag exists
        id: check_tag
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create tag and release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "AutoWSGR $VERSION" \
            --generate-notes \
            --latest
