    rewards: {oil: 300, steel: 400, other: '战利品x7, 大胃王的藏品x2'}

  - id: w_boss_4
    name: '旗舰击破(4图)'
    description: '在任意4图关卡中击沉最终节点敌军舰队旗舰5次'
    chain_parent: w_boss_3
    rewards: {oil: 300, steel: 400, other: '战利品x7, 大胃王的藏品x2'}

  - id: w_boss_5
    name: '旗舰击破(5图)'
    description: '在任意5图关卡中击沉最终节点敌军舰队旗舰5次'
    chain_parent: w_boss_4
    rewards: {oil: 400, steel: 500, other: '战利品x7, 大胃王的藏品x2'}

  - id: w_boss_6
    name: '旗舰击破(6图)'
    description: '在任意6图关卡中击沉最终节点敌军舰队旗舰5次'
    chain_parent: w_boss_5
    rewards: {oil: 500, steel: 600, other: '战利品x7, 大胃王的藏品x2'}

  - id: w_boss_7
    name: '旗舰击破(7图)'
    description: '在任意7图关卡中击沉最终节点敌军舰队旗舰5次'
    chain_parent: w_boss_6
    rewards: {oil: 600, steel: 700, other: '战利品x7, 大胃王的藏品x2'}

  - id: w_boss_8
    name: '旗舰击破(8图)'
    description: '在任意8图关卡中击沉最终节点敌军舰队旗舰5次'
    chain_parent: w_boss_7
    rewards: {oil: 700, steel: 800, other: '战利品x7, 大胃王的藏品x2'}

  - id: w_boss_9
    name: '旗舰击破(9图)'
    description: '在任意9图关卡中击沉最终节点敌军舰队旗舰5次'
    chain_parent: w_boss_8
    rewards: {oil: 1000, steel: 1500, other: '战利品x7, 大胃王的藏品x2'}

  # ── 需完成一次日常后刷新的周常 ──
  - id: w_expedition
    name: '大规模[远征]'
    description: '进行20次远征'
    chain_parent: null
    rewards: {oil: 300, ammo: 300, steel: 300, aluminum: 200}

  - id: w_exercise
    name: '大规模[演习]'
    description: '进行20次舰队演习'
    chain_parent: null
    rewards: {oil: 300, ammo: 300, steel: 300, aluminum: 200}

  - id: w_develop
    name: '大规模[开发]'
    description: '进行20次装备开发'
    chain_parent: null
    rewards: {oil: 200, ammo: 200, steel: 200, aluminum: 200}

  - id: w_build
    name: '大规模[建造]'
    description: '进行10次舰船建造'
    chain_parent: null
    rewards: {oil: 200, ammo: 200, steel: 200, aluminum: 200}

  - id: w_intensify
    name: '大规模[强化]'
    description: '进行20次舰船强化'
    chain_parent: null
    rewards: {oil: 200, ammo: 200, steel: 200, aluminum: 100}

  - id: w_cook
    name: '大规模[料理]'
    description: '进行10次料理制作'
    chain_parent: null
    rewards: {oil: 200, ammo: 200, steel: 200, aluminum: 200}

# 任务名称 -> OCR 匹配用关键词列表
# OCR 不总是精确识别，这里列出用于模糊匹配的核心文本片段
ocr_keywords:
  daily:
    - '击退敌军舰队'
    - '击破敌军主力'
    - '击退敌军舰队10次'
    - '舰队补给'
    - '舰队休整'
    - '常规[远征]'
    - '常规[演习]'
    - '食堂开饭'
    - '[出征]作战'
    - '[开发]新装备'
    - '[建造]新船只'
    - '[强化]船只'
    - '[远征]大成功'
    - '胜利的滋味'
  weekly:
    - '50场战斗胜利'
    - '击沉100艘'
    - '旗舰击破'
    - '大规模[远征]'
    - '大规模[演习]'
    - '大规模[开发]'
    - '大规模[建造]'
    - '大规模[强化]'
    - '大规模[料理]'
