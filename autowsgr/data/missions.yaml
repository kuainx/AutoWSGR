    rewards: {oil: 200, steel: 300, other: '战利品x7, 大胃王的藏品x2'}

  - id: w_boss_3
    name: '旗舰击破(3图)'
    description: '在任意3图关卡中击沉最终节点敌军舰队旗舰5次'
